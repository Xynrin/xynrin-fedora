name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck
          # SC1091 = source 解析不到（运行时正确）
          # SC2086 = 已在代码里 disable
          # SC2155 = 不强制
          shellcheck --severity=warning --exclude=SC1091,SC2155 \
            bootstrap.sh \
            install.sh \
            scripts/*.sh \
            kde-dotfiles/.local/bin/up \
            kde-dotfiles/.local/bin/xynrin \
            kde-dotfiles/.local/bin/xf-*

  fedora-detection:
    name: Fedora 检测（非 Fedora 必须退出）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bootstrap on non-Fedora must fail
        run: |
          # bootstrap.sh 在 Ubuntu 上必须立即退出
          if bash bootstrap.sh 2>&1 | tee /tmp/out.txt; then
            echo "FAIL: bootstrap.sh 在非 Fedora 上没有退出"
            exit 1
          fi
          grep -qi "仅支持 Fedora" /tmp/out.txt || { echo "FAIL: 未输出预期错误"; cat /tmp/out.txt; exit 1; }
          echo "OK: bootstrap 在 Ubuntu 上正确拒绝运行"

  fedora-dryrun:
    name: Dry-run on Fedora ${{ matrix.fedora }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        fedora: ["44", "43", "42"]
    container:
      image: fedora:${{ matrix.fedora }}
      options: --user root
    steps:
      - name: Install base tools
        run: |
          dnf install -y --setopt=install_weak_deps=False \
            git fzf rsync sudo findutils which procps-ng \
            shadow-utils awk gawk pciutils curl

      - uses: actions/checkout@v4

      - name: Create non-root user
        run: |
          useradd -m -u 1000 -s /bin/bash xynrin
          echo 'xynrin ALL=(ALL) NOPASSWD: ALL' > /etc/sudoers.d/xynrin
          chmod 440 /etc/sudoers.d/xynrin
          chown -R xynrin:xynrin "$GITHUB_WORKSPACE"

      - name: Verify Fedora detection
        run: |
          source /etc/os-release
          echo "OS: $PRETTY_NAME"
          rpm -E %fedora
          which dnf5 || echo "no dnf5"
          which dnf  || echo "no dnf"

      - name: Run install.sh --all --dry-run
        run: |
          su - xynrin -c "
            set -e
            cd '$GITHUB_WORKSPACE'
            export DRY_RUN=1
            export XF_SKIP_CN_MIRROR=1
            export XF_NONINTERACTIVE=1
            chmod +x bootstrap.sh install.sh scripts/*.sh
            chmod +x kde-dotfiles/.local/bin/*
            bash install.sh --all --dry-run
          "

      - name: Run --only apps in dry-run
        run: |
          su - xynrin -c "
            cd '$GITHUB_WORKSPACE'
            export DRY_RUN=1
            export XF_SKIP_CN_MIRROR=1
            export XF_NONINTERACTIVE=1
            bash install.sh --only apps --dry-run
          "

      - name: Show install log
        if: always()
        run: |
          echo '===== /tmp/xynrin-fedora-install.log ====='
          cat /tmp/xynrin-fedora-install.log 2>/dev/null || echo '(no log)'
